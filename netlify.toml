[build]
  publish   = "."
  functions = "netlify/functions"
  command   = ""

[[redirects]]
  from   = "/"
  to     = "/index.html"
  status = 200

[[redirects]]
  from   = "/dashboard"
  to     = "/dashboard.html"
  status = 200

[[redirects]]
  from   = "/api/chat"
  to     = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from   = "/api/xero/*"
  to     = "/.netlify/functions/xero"
  status = 200
